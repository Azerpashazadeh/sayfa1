
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaydırmalı Kart</title>
    <style>
        .swipe-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 32px;
            padding: 2rem;
            max-width: 350px;
            margin: 1rem auto;
            text-align: center;
            transition: all 0.3s;
            touch-action: pan-y; /* Dikey kaydırmayı etkinleştir */
        }
        .swipe-card .content {
            transition: all 0.3s;
        }
        .swipe-card .image-area {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            margin-top: 0;
        }
        .swipe-card.expanded .image-area {
            max-height: 250px;
            margin-top: 1.5rem;
        }
        .swipe-card img {
            width: 100%;
            border-radius: 20px;
            max-width: 250px;
        }
        .swipe-hint {
            font-size: 12px;
            margin-top: 1rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
<div class="swipe-card" id="swipeCard">
    <div class="content">
        <h3>🚸 Okul Geçidi</h3>
        <p>Okul geçidi levhası (J22): Okul çağındaki çocukların bulunduğu bölgelerde sürücülerin ekstra dikkatli olması gerektiğini belirtir.</p>
        <div class="swipe-hint">👆 <strong>Yukarı kaydır</strong> → görseli göster / aşağı kaydır → gizle</div>
    </div>
    <div class="image-area">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/NL-verkeersbord_J22.svg/400px-NL-verkeersbord_J22.svg.png" alt="Okul geçidi levhası">
        <p style="font-size: 12px; margin-top: 8px;">📚 J22 - Okul geçidi</p>
    </div>
</div>

<script>
    const swipeCard = document.getElementById('swipeCard');
    let startY = 0;
    let isExpanded = false;

    swipeCard.addEventListener('touchstart', (e) => {
        startY = e.touches[0].clientY;
    });
    swipeCard.addEventListener('touchmove', (e) => {
        const deltaY = e.touches[0].clientY - startY;
        if (deltaY < -30 && !isExpanded) {
            // Yukarı kaydırma
            swipeCard.classList.add('expanded');
            isExpanded = true;
        } else if (deltaY > 30 && isExpanded) {
            // Aşağı kaydırma
            swipeCard.classList.remove('expanded');
            isExpanded = false;
        }
    });
</script>
</body>
</html>

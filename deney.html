<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightbox Görsel</title>
    <style>
        .lightbox-card {
            background: #1e293b;
            color: white;
            border-radius: 28px;
            padding: 1.8rem;
            max-width: 350px;
            margin: 1rem auto;
            text-align: center;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .lightbox-card:active {
            transform: scale(0.97);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .modal img {
            max-width: 85%;
            max-height: 70%;
            border-radius: 24px;
            box-shadow: 0 25px 40px black;
        }
        .modal .close-hint {
            color: white;
            margin-top: 20px;
            font-size: 14px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 40px;
        }
    </style>
</head>
<body>
<div class="lightbox-card" id="lightboxCard">
    <h3>⚠️ Kaygan Yol Uyarısı</h3>
    <p>J2 levhası: Yağmur, buz veya ıslak yaprak nedeniyle yol kaygan olabilir. Hızınızı azaltın, ani fren ve direksiyon hareketlerinden kaçının.</p>
    <small>📸 <strong>Dokun</strong> → görseli tam ekran gör</small>
</div>

<div class="modal" id="imageModal">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/NL-verkeersbord_J2.svg/400px-NL-verkeersbord_J2.svg.png" alt="Kaygan yol levhası">
    <div class="close-hint">✨ Herhangi bir yere dokunarak kapatın</div>
</div>

<script>
    const card = document.getElementById('lightboxCard');
    const modal = document.getElementById('imageModal');
    
    card.addEventListener('click', () => {
        modal.style.display = 'flex';
    });
    modal.addEventListener('click', () => {
        modal.style.display = 'none';
    });
</script>
</body>
</html>
